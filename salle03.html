<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salle 3 — CHU Psychiatrique</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/salle.css">
</head>
<body>

<header class="topbar" style="justify-content: center; position: relative; height: 120px;">
  <a href="index.html" class="topbar-brand" style="margin: 0 auto;">
    <img src="assets/entete.png" alt="En-tête GST" style="height: 100px; width: auto; object-fit: contain;">
  </a>
  <nav class="topbar-nav" style="position: absolute; right: 24px; top: 50%; transform: translateY(-50%);"></nav>
</header>

<!-- HERO SALLE -->
<div class="salle-hero" id="salle-hero">
  <div class="salle-info">
    <div class="salle-num-label">Espace de consultation</div>
    <div class="salle-num">
      <span id="salle-num-display">Salle 3</span>
      <span class="salle-type-badge" id="salle-type-label">Consultation Psychiatrique</span>
    </div>
  </div>
  <div class="salle-doctor" id="doctor-box">
    <div class="doctor-avatar" id="doctor-avatar">👨‍⚕️</div>
    <div class="doctor-info">
      <div class="doctor-name" id="doctor-name">Chargement...</div>
      <div class="doctor-sub" id="doctor-sub">Médecin du jour</div>
    </div>
  </div>
</div>

<!-- CONTENU PRINCIPAL -->
<div class="salle-layout">

  <!-- COLONNE PRINCIPALE -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <!-- Patient courant -->
    <div class="card">
      <div class="card-header">
        <h2>🔔 Patient en cours</h2>
        <span id="current-status-badge" class="badge badge-attente" style="display:none;"></span>
      </div>
      <div class="card-body">
        <!-- Patient appelé -->
        <div id="current-patient-card" class="current-patient-card" style="display:none;">
          <div class="current-label">PATIENT APPELÉ</div>
          <div class="current-num" id="current-num">—</div>
          <div class="current-name" id="current-name">—</div>
          <div class="current-time" id="current-time"></div>
        </div>

        <!-- Aucun patient -->
        <div id="no-current-patient" class="empty-state">
          <div class="empty-icon">🕐</div>
          <p>Aucun patient en cours — Cliquez "Appeler le suivant"</p>
        </div>

        <!-- Boutons d'action -->
        <div class="action-buttons" style="margin-top:20px;">
          <button class="btn-call btn-call-next" id="btn-call-next" onclick="appellerSuivant()">
            📢 Appeler le suivant
          </button>
          <button class="btn-call btn-call-arrived" id="btn-arrived" onclick="patientArrive()" disabled>
            👤 Patient présent
          </button>
          <button class="btn-call btn-call-done" id="btn-call-done" onclick="terminerConsultation()" disabled>
            ✅ Consultation terminée
          </button>
        </div>
      </div>
    </div>

    <!-- File d'attente -->
    <div class="card">
      <div class="card-header">
        <h2>⏳ File d'attente</h2>
        <span class="badge badge-attente" id="queue-count">0</span>
      </div>
      <div class="card-body" style="padding:12px;">
        <div id="queue-list" class="queue-list">
          <div class="empty-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

  </div>

  <!-- COLONNE LATÉRALE -->
  <div class="sidebar-panel">

    <!-- Compteurs -->
    <div class="card">
      <div class="card-header"><h2>📊 Aujourd'hui</h2></div>
      <div class="card-body">
        <div class="counters-grid">
          <div class="counter-box">
            <div class="counter-value" id="counter-attente">0</div>
            <div class="counter-label">En attente</div>
          </div>
          <div class="counter-box">
            <div class="counter-value" id="counter-termine" style="color:var(--success);">0</div>
            <div class="counter-label">Terminés</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Historique -->
    <div class="card">
      <div class="card-header">
        <h2>📋 Historique</h2>
        <span class="badge badge-termine" id="history-count">0</span>
      </div>
      <div class="card-body" style="padding:12px;">
        <div id="history-list" class="history-list"></div>
      </div>
    </div>

  </div>
</div>

<script>const SALLE_NUMERO = 3;</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/salle.js"></script>
</body>
</html>
