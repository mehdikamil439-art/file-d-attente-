<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شاشة الاستقبال — المستشفى الجامعي محمد السادس للأمراض العقلية والنفسية</title>
  <link rel="stylesheet" href="css/affichage.css?v=3">
</head>
<body>
  <div class="tv-layout">

    <!-- ══ HEADER ══════════════════════════════════════════ -->
    <header class="tv-header">

      <!-- Horloge (à droite, car 1er élément en RTL) -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:130px;">
        <div class="tv-clock-box" style="align-items:center;">
          <div class="tv-time" id="tv-time">00:00:00</div>
          <div class="tv-date" id="tv-date" style="text-align:center;"></div>
        </div>
      </div>

      <!-- Image en-tête officielle (centre) -->
      <div class="tv-hospital-center">
        <img src="assets/entete.png" alt="En-tête officiel" class="tv-entete-img">
      </div>

      <!-- Live (à gauche, car dernier élément en RTL) -->
      <div style="display:flex;flex-direction:column;align-items:flex-end;min-width:130px;">
        <div class="live-indicator" id="live-indicator" style="display:none;">
          <div class="live-dot"></div>
          <span>مباشر</span>
        </div>
      </div>

    </header>

    <!-- ══ BODY — Grille des badges ════════════════════════ -->
    <main class="tv-body">
      <div class="tv-section-title">📢 &nbsp; الأرقام المستدعاة &nbsp; 📢</div>

      <!-- État vide -->
      <div class="tv-empty" id="tv-empty">
        <div class="tv-empty-icon">🏥</div>
        <div class="tv-empty-text">في انتظار استدعاء المرضى</div>
      </div>

      <!-- Grille (remplie dynamiquement) -->
      <div class="tv-calls-grid" id="calls-grid"></div>
    </main>

    <!-- ══ TICKER ════════════════════════════════════════ -->
    <footer class="tv-ticker">
      <div class="tv-ticker-label">
        <span>📡</span>
        <span>إشعار</span>
      </div>
      <div class="tv-ticker-content" id="ticker-content"></div>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/affichage.js"></script>
</body>
</html>
